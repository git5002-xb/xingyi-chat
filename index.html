<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星艺造型 - 在线预约</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --card: #16213e;
            --text: #eaeaea;
            --text-dim: #8892b0;
            --border: rgba(233, 69, 96, 0.2);
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--card) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Token Setup */
        .token-setup {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin: 20px;
        }

        .token-setup h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--accent-light);
        }

        .token-setup input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .token-setup button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Message Styles */
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            margin-left: 10px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border-bottom-right-radius: 4px;
            margin-right: 10px;
        }

        /* Service Buttons */
        .service-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .service-btn {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .service-btn:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
            transform: translateY(-2px);
        }

        .service-btn .name {
            font-weight: 600;
            color: var(--accent-light);
        }

        .service-btn .price {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Staff Buttons */
        .staff-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .staff-btn {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .staff-btn:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .staff-btn .title {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Form Styles */
        .appointment-form {
            margin-top: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .form-submit {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .form-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        /* Success Message */
        .success-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(52, 211, 153, 0.1) 100%);
            border: 1px solid var(--success);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .success-box .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .success-box h3 {
            color: var(--success);
            margin-bottom: 8px;
        }

        .success-box .detail {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            padding: 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .input-wrapper input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
        }

        .input-wrapper button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .input-wrapper button:hover {
            transform: scale(1.1);
        }

        /* Status Badge */
        .sync-status {
            position: fixed;
            top: 80px;
            right: 16px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
        }

        .sync-status.connected {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .sync-status.disconnected {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .sync-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ 星艺造型</h1>
        <p>轻奢店 · 预约服务</p>
    </div>

    <div id="syncStatus" class="sync-status disconnected">
        <span class="dot"></span>
        <span>未连接</span>
    </div>

    <div id="tokenSetup" class="token-setup" style="display: none;">
        <h3>🔗 首次使用需要授权</h3>
        <input type="password" id="githubToken" placeholder="粘贴你的GitHub Token">
        <button onclick="saveToken()">确认授权</button>
        <p style="font-size: 12px; color: var(--text-dim); margin-top: 8px;">
            Token用于同步预约数据到后台，仅限店主使用
        </p>
    </div>

    <div class="chat-container" id="chatContainer">
        <!-- Messages will be inserted here -->
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="输入您想说的话..." autocomplete="off">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            repo: 'git5002-xb/xingyi-chat',  // 存储预约数据的仓库
            label: 'appointment'  // Issue标签
        };

        // 状态管理
        let state = {
            step: 'greeting',
            selectedService: null,
            selectedStaff: null,
            token: localStorage.getItem('xingyi_github_token') || ''
        };

        // 知识库
        const KNOWLEDGE = {
            shop: {
                name: '星艺造型',
                address: '青岛市南区万象汇3楼308',
                phone: '0532-88888888',
                hours: '10:00-21:00'
            },
            services: {
                '洗剪吹': { price: '68元', desc: '基础造型' },
                '洗剪吹+造型': { price: '98元', desc: '含吹风造型' },
                '染发': { price: '288元起', desc: '进口染膏' },
                '烫发': { price: '388元起', desc: '冷烫/热烫可选' },
                '头皮护理': { price: '168元', desc: '深层清洁护理' }
            },
            staff: [
                { name: '林辰', title: '技术总监', exp: '8年', special: '高级定制、明星造型' },
                { name: '苏晚', title: '资深发型师', exp: '5年', special: '自然生活风、韩式造型' },
                { name: '陈默', title: '男士专家', exp: '6年', special: '男士理发、渐变雕刻' },
                { name: '夏禾', title: '儿童造型师', exp: '4年', special: '儿童可爱发型' },
                { name: '周宇', title: '色彩导师', exp: '7年', special: '创意染发、渐变挑染' }
            ],
            workflow: {
                greeting: '👋 您好，欢迎来到星艺造型！\n\n我是您的专属客服小艺，请问今天想做什么服务呢？',
                serviceAsk: '请告诉我您想做的服务：\n\n• 洗剪吹 68元\n• 洗剪吹+造型 98元\n• 染发 288元起\n• 烫发 388元起\n• 头皮护理 168元',
                staffRecommend: '我们的理发师团队：',
                appointmentAsk: '请填写您的预约信息：',
                appointmentSuccess: '🎉 预约成功！\n\n我们已收到您的预约，稍后会有工作人员电话确认。\n\n📍 到店地址：青岛市南区万象汇3楼308\n📞 有问题可致电：0532-88888888\n\n期待为您服务！'
            }
        };

        // 初始化
        function init() {
            checkToken();
            addMessage(KNOWLEDGE.workflow.greeting, 'ai');
        }

        // 检查Token
        function checkToken() {
            if (!state.token) {
                document.getElementById('tokenSetup').style.display = 'block';
            } else {
                updateSyncStatus(true);
            }
        }

        // 保存Token
        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                alert('请输入Token');
                return;
            }
            state.token = token;
            localStorage.setItem('xingyi_github_token', token);
            document.getElementById('tokenSetup').style.display = 'none';
            updateSyncStatus(true);
            addMessage('✅ 已连接后台，数据将自动同步', 'ai');
        }

        // 更新同步状态
        function updateSyncStatus(connected) {
            const el = document.getElementById('syncStatus');
            if (connected) {
                el.className = 'sync-status connected';
                el.innerHTML = '<span class="dot"></span><span>已同步</span>';
            } else {
                el.className = 'sync-status disconnected';
                el.innerHTML = '<span class="dot"></span><span>未连接</span>';
            }
        }

        // 添加消息
        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `
                <div class="message-avatar">${type === 'ai' ? '💇' : '👤'}</div>
                <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 添加按钮消息
        function addButtons(content, buttons, type = 'ai') {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `
                <div class="message-avatar">${type === 'ai' ? '💇' : '👤'}</div>
                <div class="message-content">
                    ${content.replace(/\n/g, '<br>')}
                    <div id="dynamicButtons" class="${type === 'ai' ? 'service-buttons' : 'staff-buttons'}"></div>
                </div>
            `;
            container.appendChild(msg);

            const btnContainer = msg.querySelector('#dynamicButtons');
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = type === 'ai' ? 'service-btn' : 'staff-btn';
                button.innerHTML = btn.html;
                button.onclick = () => {
                    addMessage(btn.text, 'user');
                    btn.action();
                };
                btnContainer.appendChild(button);
            });

            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            // 模拟AI思考
            setTimeout(() => {
                const response = processMessage(msg);
                addMessage(response, 'ai');
            }, 500 + Math.random() * 500);
        }

        // 处理消息
        function processMessage(userMsg) {
            const msg = userMsg.toLowerCase().trim();

            // 问候和基础查询
            if (msg.includes('地址') || msg.includes('在哪') || msg.includes('位置')) {
                return `📍 我们的地址是：\n\n${KNOWLEDGE.shop.address}\n\n🕐 营业时间：${KNOWLEDGE.shop.hours}\n📞 联系电话：${KNOWLEDGE.shop.phone}`;
            }

            if (msg.includes('电话') || msg.includes('联系')) {
                return `📞 联系我们：\n\n电话：${KNOWLEDGE.shop.phone}\n地址：${KNOWLEDGE.shop.address}`;
            }

            if (msg.includes('营业') || msg.includes('开门')) {
                return `🕐 营业时间：\n\n${KNOWLEDGE.shop.hours}\n\n欢迎提前预约，避开高峰期～`;
            }

            if (msg.includes('理发师') || msg.includes('发型师') || msg.includes('师傅')) {
                let staffList = '👨‍💼 我们的理发师团队：\n\n';
                KNOWLEDGE.staff.forEach(s => {
                    staffList += `• ${s.name}（${s.title}）\n`;
                });
                return staffList;
            }

            // 预约流程
            switch (state.step) {
                case 'greeting':
                    if (msg.includes('预约') || msg.includes('想') || msg.includes('做') || msg.includes('洗') || msg.includes('染') || msg.includes('烫') || msg.includes('剪')) {
                        state.step = 'service';
                        return showServices();
                    }
                    return KNOWLEDGE.workflow.serviceAsk;

                case 'service':
                    // 点击服务按钮后，state.step 已更新，这里处理文字输入
                    for (const service of Object.keys(KNOWLEDGE.services)) {
                        if (msg.includes(service.replace('+', '')) || service.includes(msg)) {
                            state.selectedService = service;
                            state.step = 'staff';
                            return showStaff(service);
                        }
                    }
                    // 如果输入了其他内容，显示服务列表
                    return showServices();

                case 'staff':
                    for (const s of KNOWLEDGE.staff) {
                        if (msg.includes(s.name)) {
                            state.selectedStaff = s.name;
                            state.step = 'form';
                            return showForm(s);
                        }
                    }
                    return showStaff(null);

                case 'form':
                    return '请填写上面的预约表单，然后点击"确认预约信息"按钮～';

                default:
                    state.step = 'service';
                    return showServices();
            }
        }

        // 显示服务列表
        function showServices() {
            let content = '请选择您想做的服务：\n\n';
            addButtons(content, Object.entries(KNOWLEDGE.services).map(([name, info]) => ({
                html: `<span class="name">${name}</span><span class="price">${info.price}</span>`,
                text: name,
                action: () => {
                    state.selectedService = name;
                    state.step = 'staff';
                    const response = showStaff(name);
                    addMessage(response, 'ai');
                }
            })));
            return ''; // 消息已通过addButtons添加
        }

        // 显示理发师列表
        function showStaff(selectedService) {
            let content = '';
            if (selectedService) {
                content = `您选择了【${selectedService}】，价格：${KNOWLEDGE.services[selectedService].price}\n\n`;
            }
            content += '请选择理发师：\n\n';

            addButtons(content, KNOWLEDGE.staff.map(s => ({
                html: `<span><strong>${s.name}</strong> <span class="title">${s.title}</span></span><span style="font-size:12px;color:var(--accent-light)">${s.exp}</span>`,
                text: s.name,
                action: () => {
                    state.selectedStaff = s.name;
                    state.step = 'form';
                    const response = showForm(s);
                    addMessage(response, 'ai');
                }
            })));
            return '';
        }

        // 显示预约表单
        function showForm(staff) {
            const today = new Date().toISOString().split('T')[0];
            const times = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'];

            return `${staff.name}（${staff.title}，${staff.exp}经验）\n擅长：${staff.special}\n\n请填写预约信息：\n\n<form id="appointmentForm" class="appointment-form">
<div class="form-group"><label>您的姓名</label><input type="text" id="formName" placeholder="请输入姓名" required></div>
<div class="form-group"><label>联系电话</label><input type="tel" id="formPhone" placeholder="请输入手机号" required></div>
<div class="form-group"><label>预约日期</label><input type="date" id="formDate" value="${today}" min="${today}" required></div>
<div class="form-group"><label>预约时间</label><select id="formTime" required>${times.map(t => `<option value="${t}">${t}</option>`).join('')}</select></div>
<button type="button" class="form-submit" onclick="submitAppointment()">确认预约信息</button>
</form>`;
        }

        // 提交预约
        async function submitAppointment() {
            const name = document.getElementById('formName')?.value;
            const phone = document.getElementById('formPhone')?.value;
            const date = document.getElementById('formDate')?.value;
            const time = document.getElementById('formTime')?.value;

            if (!name || !phone || !date || !time) {
                alert('请填写完整信息');
                return;
            }

            // 验证手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            // 创建预约数据
            const appointment = {
                id: Date.now(),
                name,
                phone: phone.slice(0, 3) + '****' + phone.slice(-4), // 脱敏
                phoneRaw: phone,
                service: state.selectedService,
                servicePrice: KNOWLEDGE.services[state.selectedService]?.price || '',
                stylist: state.selectedStaff,
                date,
                time,
                createdAt: new Date().toISOString(),
                status: '待确认'
            };

            // 保存到本地
            const appointments = JSON.parse(localStorage.getItem('xingyi_appointments') || '[]');
            appointments.push(appointment);
            localStorage.setItem('xingyi_appointments', JSON.stringify(appointments));

            // 同步到GitHub
            if (state.token) {
                await syncToGitHub(appointment);
            }

            state.step = 'success';
            addMessage(`🎉 预约成功！\n\n我们已收到您的预约，稍后会有工作人员电话确认。\n\n📍 到店地址：青岛市南区万象汇3楼308\n📞 有问题可致电：0532-88888888\n\n期待为您服务！`, 'ai');
        }

        // 同步到GitHub
        async function syncToGitHub(appointment) {
            try {
                // 创建Issue
                const issueData = {
                    title: `📅 新预约：${appointment.name} - ${appointment.service}`,
                    body: `## 预约信息

| 项目 | 内容 |
|------|------|
| 姓名 | ${appointment.name} |
| 电话 | ${appointment.phone} |
| 服务 | ${appointment.service}（${appointment.servicePrice}） |
| 理发师 | ${appointment.stylist} |
| 日期 | ${appointment.date} |
| 时间 | ${appointment.time} |
| 提交时间 | ${new Date(appointment.createdAt).toLocaleString('zh-CN')} |

---
*由星艺造型系统自动创建*`,
                    labels: [CONFIG.label]
                };

                const response = await fetch(`https://api.github.com/repos/${CONFIG.repo}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${state.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(issueData)
                });

                if (response.ok) {
                    updateSyncStatus(true);
                    console.log('预约已同步到GitHub');
                } else {
                    const error = await response.json();
                    console.error('同步失败:', error);
                }
            } catch (error) {
                console.error('同步错误:', error);
            }
        }

        // 回车发送
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 初始化
        init();
    </script>
</body>
</html>
