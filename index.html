<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星艺造型 - 在线预约</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --card: #16213e;
            --text: #eaeaea;
            --text-dim: #8892b0;
            --border: rgba(233, 69, 96, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--card) 100%);
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            margin-top: 6px;
        }

        .sync-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }

        .sync-status.connected .dot { background: #4ade80; }
        .sync-status.connected { background: rgba(74, 222, 128, 0.15); color: #4ade80; }

        .token-setup {
            background: var(--card);
            padding: 20px;
            margin: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .token-setup h3 { font-size: 14px; margin-bottom: 12px; color: var(--accent-light); }
        .token-setup input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .token-setup button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.user .message-content { background: var(--accent); color: white; }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%); }
        .message.user .message-avatar { background: rgba(255,255,255,0.2); }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            background: var(--card);
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user .message-content { border-bottom-right-radius: 4px; }
        .message.ai .message-content { border-bottom-left-radius: 4px; }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, var(--bg) 20%);
            padding: 20px;
            padding-top: 40px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--card);
            border-radius: 24px;
            padding: 6px;
            border: 1px solid var(--border);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
        }

        .input-wrapper button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-wrapper button:active { transform: scale(0.95); }

        .service-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .service-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .service-btn:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .service-btn .price { color: var(--accent-light); font-size: 13px; }

        .staff-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .staff-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .staff-btn:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .staff-btn .title { color: var(--text-dim); font-size: 12px; margin-left: 8px; }

        .appointment-form { margin-top: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .form-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }

        .success-message {
            text-align: center;
            padding: 20px;
        }

        .success-message .emoji { font-size: 48px; margin-bottom: 16px; }
        .success-message h3 { color: var(--accent-light); margin-bottom: 12px; }
        .success-message p { color: var(--text-dim); font-size: 13px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💇 星艺造型 - 在线预约</h1>
        <div id="syncStatus" class="sync-status">
            <span class="dot"></span>
            <span>未连接</span>
        </div>
    </div>

    <div class="token-setup" id="tokenSetup" style="display:none;">
        <h3>🔗 首次使用需要授权</h3>
        <input type="password" id="githubToken" placeholder="粘贴你的GitHub Token">
        <button onclick="saveToken()">确认授权</button>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="输入您想说的话..." autocomplete="off">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            repo: 'git5002-xb/xingyi-chat',
            label: 'appointment'
        };

        // 状态管理
        let state = {
            step: 'greeting',
            selectedService: null,
            selectedStaff: null,
            token: localStorage.getItem('xingyi_github_token') || '',
            isProcessing: false  // 防止重复处理
        };

        // 知识库
        const KNOWLEDGE = {
            shop: {
                name: '星艺造型',
                address: '青岛市南区万象汇3楼308',
                phone: '0532-88888888',
                hours: '10:00-21:00'
            },
            services: {
                '洗剪吹': { price: '68元', desc: '基础造型' },
                '洗剪吹+造型': { price: '98元', desc: '含吹风造型' },
                '染发': { price: '288元起', desc: '进口染膏' },
                '烫发': { price: '388元起', desc: '冷烫/热烫可选' },
                '头皮护理': { price: '168元', desc: '深层清洁护理' }
            },
            staff: [
                { name: '林辰', title: '技术总监', exp: '8年', special: '高级定制、明星造型' },
                { name: '苏晚', title: '资深发型师', exp: '5年', special: '自然生活风、韩式造型' },
                { name: '陈默', title: '男士专家', exp: '6年', special: '男士理发、渐变雕刻' },
                { name: '夏禾', title: '儿童造型师', exp: '4年', special: '儿童可爱发型' },
                { name: '周宇', title: '色彩导师', exp: '7年', special: '创意染发、渐变挑染' }
            ]
        };

        // 初始化
        function init() {
            checkToken();
            addMessage('👋 您好，欢迎来到星艺造型！\n\n我是您的专属客服小艺，请问今天想做什么服务呢？', 'ai');
        }

        // 检查Token
        function checkToken() {
            if (!state.token) {
                document.getElementById('tokenSetup').style.display = 'block';
            } else {
                document.getElementById('syncStatus').className = 'sync-status connected';
                document.getElementById('syncStatus').innerHTML = '<span class="dot"></span><span>已同步</span>';
            }
        }

        // 保存Token
        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                alert('请输入Token');
                return;
            }
            state.token = token;
            localStorage.setItem('xingyi_github_token', token);
            document.getElementById('tokenSetup').style.display = 'none';
            document.getElementById('syncStatus').className = 'sync-status connected';
            document.getElementById('syncStatus').innerHTML = '<span class="dot"></span><span>已同步</span>';
            addMessage('✅ 已连接后台，数据将自动同步', 'ai');
        }

        // 添加消息
        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `
                <div class="message-avatar">${type === 'ai' ? '💇' : '👤'}</div>
                <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 添加服务按钮
        function addServiceButtons() {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = 'message ai';
            let buttonsHtml = '<div class="service-buttons">';
            
            Object.entries(KNOWLEDGE.services).forEach(([name, info]) => {
                buttonsHtml += `<button class="service-btn" onclick="onServiceClick('${name}')">
                    <span class="name">${name}</span>
                    <span class="price">${info.price}</span>
                </button>`;
            });
            buttonsHtml += '</div>';
            
            msg.innerHTML = `
                <div class="message-avatar">💇</div>
                <div class="message-content">
                    请选择您想做的服务：
                    ${buttonsHtml}
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 添加理发师按钮
        function addStaffButtons(service) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = 'message ai';
            let buttonsHtml = '<div class="staff-buttons">';
            
            KNOWLEDGE.staff.forEach(s => {
                buttonsHtml += `<button class="staff-btn" onclick="onStaffClick('${s.name}')">
                    <span><strong>${s.name}</strong><span class="title">${s.title}</span></span>
                    <span style="font-size:12px;color:var(--accent-light)">${s.exp}</span>
                </button>`;
            });
            buttonsHtml += '</div>';
            
            msg.innerHTML = `
                <div class="message-avatar">💇</div>
                <div class="message-content">
                    您选择了【${service}】，价格：${KNOWLEDGE.services[service].price}
                    <br><br>请选择理发师：
                    ${buttonsHtml}
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 添加预约表单
        function addAppointmentForm(staffName) {
            const staff = KNOWLEDGE.staff.find(s => s.name === staffName);
            const today = new Date().toISOString().split('T')[0];
            const times = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'];
            
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = 'message ai';
            msg.innerHTML = `
                <div class="message-avatar">💇</div>
                <div class="message-content">
                    ${staff.name}（${staff.title}，${staff.exp}经验）
                    <br>擅长：${staff.special}
                    <br><br>请填写预约信息：
                    <form class="appointment-form" onsubmit="return false;">
                        <div class="form-group">
                            <label>您的姓名</label>
                            <input type="text" id="formName" placeholder="请输入姓名" required>
                        </div>
                        <div class="form-group">
                            <label>联系电话</label>
                            <input type="tel" id="formPhone" placeholder="请输入手机号" required>
                        </div>
                        <div class="form-group">
                            <label>预约日期</label>
                            <input type="date" id="formDate" value="${today}" min="${today}" required>
                        </div>
                        <div class="form-group">
                            <label>预约时间</label>
                            <select id="formTime" required>
                                ${times.map(t => `<option value="${t}">${t}</option>`).join('')}
                            </select>
                        </div>
                        <button type="button" class="form-submit" onclick="submitAppointment()">确认预约信息</button>
                    </form>
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 点击服务按钮
        function onServiceClick(serviceName) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            state.selectedService = serviceName;
            state.step = 'staff';
            
            addMessage(serviceName, 'user');
            
            setTimeout(() => {
                addStaffButtons(serviceName);
                state.isProcessing = false;
            }, 300);
        }

        // 点击理发师按钮
        function onStaffClick(staffName) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            state.selectedStaff = staffName;
            state.step = 'form';
            
            addMessage(staffName, 'user');
            
            setTimeout(() => {
                addAppointmentForm(staffName);
                state.isProcessing = false;
            }, 300);
        }

        // 发送消息（仅处理文字输入）
        function sendMessage() {
            if (state.isProcessing) return;
            
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            setTimeout(() => {
                processUserText(msg);
            }, 500);
        }

        // 处理用户文字输入
        function processUserText(msg) {
            const text = msg.toLowerCase();
            
            // 基础查询
            if (text.includes('地址') || text.includes('在哪')) {
                addMessage(`📍 我们的地址是：\n\n${KNOWLEDGE.shop.address}\n\n🕐 营业时间：${KNOWLEDGE.shop.hours}\n📞 联系电话：${KNOWLEDGE.shop.phone}`, 'ai');
                return;
            }

            if (text.includes('电话') || text.includes('联系')) {
                addMessage(`📞 联系我们：\n\n电话：${KNOWLEDGE.shop.phone}\n地址：${KNOWLEDGE.shop.address}`, 'ai');
                return;
            }

            if (text.includes('营业') || text.includes('开门')) {
                addMessage(`🕐 营业时间：\n\n${KNOWLEDGE.shop.hours}\n\n欢迎提前预约，避开高峰期～`, 'ai');
                return;
            }

            if (text.includes('理发师') || text.includes('发型师')) {
                let list = '👨‍💼 我们的理发师团队：\n\n';
                KNOWLEDGE.staff.forEach(s => {
                    list += `• ${s.name}（${s.title}）\n`;
                });
                addMessage(list, 'ai');
                return;
            }

            // 预约意图
            if (text.includes('预约') || text.includes('想') || text.includes('洗') || text.includes('染') || text.includes('烫') || text.includes('剪')) {
                state.step = 'service';
                addMessage('好的，请问您想做哪个服务呢？', 'ai');
                setTimeout(() => addServiceButtons(), 300);
                return;
            }

            // 默认回复
            addMessage('请问有什么可以帮您的？您可以：\n\n• 说"预约"开始预约服务\n• 问"地址"查看门店位置\n• 问"理发师"查看团队介绍', 'ai');
        }

        // 提交预约
        async function submitAppointment() {
            if (state.isProcessing) return;
            state.isProcessing = true;

            const name = document.getElementById('formName')?.value;
            const phone = document.getElementById('formPhone')?.value;
            const date = document.getElementById('formDate')?.value;
            const time = document.getElementById('formTime')?.value;

            if (!name || !phone || !date || !time) {
                alert('请填写完整信息');
                state.isProcessing = false;
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                state.isProcessing = false;
                return;
            }

            // 创建预约数据
            const appointment = {
                id: Date.now(),
                name,
                phone: phone.slice(0, 3) + '****' + phone.slice(-4),
                phoneRaw: phone,
                service: state.selectedService,
                servicePrice: KNOWLEDGE.services[state.selectedService]?.price || '',
                stylist: state.selectedStaff,
                date,
                time,
                createdAt: new Date().toISOString()
            };

            // 显示成功消息
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = 'message ai';
            msg.innerHTML = `
                <div class="message-avatar">💇</div>
                <div class="message-content">
                    <div class="success-message">
                        <div class="emoji">🎉</div>
                        <h3>预约成功！</h3>
                        <p>
                            我们已收到您的预约，稍后会有工作人员电话确认。
                            <br><br>
                            📍 到店地址：${KNOWLEDGE.shop.address}
                            <br>
                            📞 有问题可致电：${KNOWLEDGE.shop.phone}
                            <br><br>
                            期待为您服务！
                        </p>
                    </div>
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;

            // 保存到本地
            const appointments = JSON.parse(localStorage.getItem('xingyi_appointments') || '[]');
            appointments.push(appointment);
            localStorage.setItem('xingyi_appointments', JSON.stringify(appointments));

            // 同步到GitHub
            if (state.token) {
                await syncToGithub(appointment);
            }

            state.step = 'success';
            state.isProcessing = false;
        }

        // 同步到GitHub
        async function syncToGithub(appointment) {
            const title = `📋 新预约：${appointment.name} - ${appointment.service}`;
            const body = `
## 📋 新预约通知

**客户姓名：** ${appointment.name}
**联系电话：** ${appointment.phoneRaw}
**预约服务：** ${appointment.service}（${appointment.servicePrice}）
**预约理发师：** ${appointment.stylist}
**预约时间：** ${appointment.date} ${appointment.time}

---
*由星艺造型在线预约系统自动创建*
            `.trim();

            try {
                await fetch(`https://api.github.com/repos/${CONFIG.repo}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${state.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title,
                        body,
                        labels: [CONFIG.label]
                    })
                });
            } catch (e) {
                console.error('同步失败:', e);
            }
        }

        // 回车发送
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 启动
        init();
    </script>
</body>
</html>
